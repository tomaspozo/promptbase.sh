project_id = "promptbase.sh"

[api]
enabled = true
port = 54321
schemas = ["api"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
schema_paths = ["./schemas/_schemas.sql", "./schemas/_extensions.sql", "./schemas/**/*.sql"]

[db.seed]
sql_paths = ["./seed.sql", "./seeds/local-secrets.seed.sql"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
# Wildcards cover the full canonical auth flow:
#   /auth/confirm           — single PKCE callback for signup, magiclink, recovery, email_change
#   /auth/update-password   — recovery destination after confirm exchange
#   /accept-invite          — workspace invitation acceptance
#   /auth/check-inbox       — pending state (no PKCE redirect ever lands here, but allowing
#                              the prefix prevents accidental denies during dev)
additional_redirect_urls = [
  "http://127.0.0.1:3000/**",
  "http://localhost:3000/**",
  "http://127.0.0.1:5173/**",
  "http://localhost:5173/**",
  "https://127.0.0.1:3000/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
# Disabled on scaffold so the first local sign-up lands in the app without
# needing SMTP. Set to true before shipping to production.
enable_confirmations = false
# 8-digit email OTP. Matches the cloud auth config (mailer_otp_length) so the
# verify-OTP flow behaves identically across local and deployed environments.
otp_length = 8

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[auth.hook.send_email]
enabled = true
uri = "pg-functions://postgres/public/_hook_send_email"

[auth.hook.before_user_created]
enabled = true
uri = "pg-functions://postgres/public/_hook_before_user_created"

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/_hook_custom_access_token"

[functions.internal-queue-worker]
enabled = true
verify_jwt = false

[functions.internal-send-auth-email]
enabled = true
verify_jwt = false

[functions.internal-invite-member]
enabled = true
verify_jwt = false

[functions.internal-send-approval-email]
enabled = true
verify_jwt = false
